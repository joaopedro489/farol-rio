services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-farol}
    ports:
      - '5432:5432'
    volumes:
      - './.data/postgres:/var/lib/postgresql/data'
